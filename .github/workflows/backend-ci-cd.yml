name: backend-dist

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: E2E
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: nestera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d nestera_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend E2E tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://user:pass@localhost:5432/nestera_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: super-secret-key-for-testing-purposes-must-be-long-enough
        run: cd backend && pnpm run test:e2e
